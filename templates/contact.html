{% extends "base.html" %}

{% block content %}
<section class="py-12">
    <div class="container mx-auto px-6">
        <div class="text-center mb-16 fade-in reveal">
            <h1 class="font-orbitron text-4xl md:text-5xl font-bold mb-4">Contact <span class="text-[#ff3b3b]">Us</span>
            </h1>
            <div class="h-1 w-24 bg-gradient-to-r from-[#ff3b3b] to-[#ff7a18] mx-auto rounded-full"></div>
        </div>

        <div class="grid md:grid-cols-3 gap-12 max-w-6xl mx-auto">
            <!-- Contact Info -->
            <div class="md:col-span-1 space-y-6 fade-in reveal">
                <div class="clay-card p-6 flex items-center gap-4 hover:border-[#ff3b3b]/50 border transition-all">
                    <div
                        class="w-14 h-14 shrink-0 bg-[#0f0f11] rounded-full flex items-center justify-center text-2xl text-[#ff3b3b] shadow-inner">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div>
                        <h4 class="font-bebas text-xl text-white tracking-wider">Venue</h4>
                        <p class="text-sm text-gray-400">Pragjyotish College Campus</p>
                    </div>
                </div>

                <div class="clay-card p-6 flex items-center gap-4 hover:border-[#ff7a18]/50 border transition-all">
                    <div
                        class="w-14 h-14 shrink-0 bg-[#0f0f11] rounded-full flex items-center justify-center text-2xl text-[#ff7a18] shadow-inner">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                    <div>
                        <h4 class="font-bebas text-xl text-white tracking-wider">Phone / WhatsApp</h4>
                        <p class="text-sm text-gray-400">+91 60020 19128</p>
                        <p class="text-sm text-gray-400">+91 60006 92893</p>
                    </div>
                </div>

                <div class="clay-card p-6 flex items-center gap-4 hover:border-pink-500/50 border transition-all">
                    <div
                        class="w-14 h-14 shrink-0 bg-[#0f0f11] rounded-full flex items-center justify-center text-2xl text-pink-500 shadow-inner">
                        <i class="fab fa-instagram"></i>
                    </div>
                    <div>
                        <h4 class="font-bebas text-xl text-white tracking-wider">Instagram</h4>
                        <p class="text-sm text-gray-400">@fusion_fiesta_esports</p>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="md:col-span-2 fade-in reveal" style="transition-delay: 200ms;">
                <div class="clay-card h-full">
                    <h3 class="font-orbitron font-bold text-2xl mb-6">Send us a message</h3>
                    <form action="{{ url_for('contact') }}" method="POST" class="space-y-6">
                        <div class="grid md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-400 ml-2">Your Name</label>
                                <input type="text" name="name" required class="clay-input" placeholder="John Doe">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-400 ml-2">Email Address</label>
                                <input type="email" name="email" required class="clay-input"
                                    placeholder="john@example.com">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-400 ml-2">Message</label>
                            <textarea name="message" rows="5" required class="clay-input resize-none"
                                placeholder="How can we help you?"></textarea>
                        </div>
                        <button type="submit" class="clay-btn w-full py-4 text-xl mt-4">
                            <i class="fas fa-paper-plane mr-2"></i> Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
